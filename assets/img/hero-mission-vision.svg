<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Definitions -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EAF7F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0F828A;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#004B49;stop-opacity:0.05" />
    </linearGradient>
    
    <linearGradient id="laptopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAF7F7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F828A;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#004B49;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#004B49" flood-opacity="0.1"/>
    </filter>
    
    <!-- Subtle Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGradient)"/>
  
  <!-- Floating geometric elements for visual interest -->
  <circle cx="150" cy="80" r="3" fill="#0F828A" opacity="0.3">
    <animate attributeName="cy" values="80;70;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="120" r="2" fill="#004B49" opacity="0.4">
    <animate attributeName="cy" values="120;110;120" dur="4s" repeatCount="indefinite"/>
  </circle>
  <rect x="100" y="200" width="4" height="4" fill="#0F828A" opacity="0.2" transform="rotate(45 102 202)">
    <animateTransform attributeName="transform" type="rotate" values="45 102 202;55 102 202;45 102 202" dur="5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Main Illustration Group - Right Side -->
  <g transform="translate(350, 50)">
    
    <!-- Central Table/Workspace -->
    <ellipse cx="200" cy="320" rx="180" ry="25" fill="#004B49" opacity="0.1"/>
    
    <!-- Large Laptop - Central Focus -->
    <g transform="translate(150, 180) rotate(-5)">
      <!-- Laptop Base -->
      <rect x="0" y="40" width="120" height="80" rx="6" fill="url(#laptopGradient)" stroke="#004B49" stroke-width="1" filter="url(#dropShadow)"/>
      <!-- Laptop Screen -->
      <rect x="5" y="0" width="110" height="70" rx="4" fill="#004B49" stroke="#0F828A" stroke-width="1"/>
      <!-- Screen Content -->
      <rect x="15" y="10" width="90" height="50" rx="2" fill="url(#screenGlow)"/>
      <!-- Code Lines Simulation -->
      <rect x="20" y="15" width="40" height="2" fill="#0F828A" opacity="0.6"/>
      <rect x="20" y="20" width="60" height="2" fill="#0F828A" opacity="0.4"/>
      <rect x="20" y="25" width="35" height="2" fill="#0F828A" opacity="0.6"/>
      <rect x="20" y="30" width="55" height="2" fill="#0F828A" opacity="0.5"/>
      <!-- Cursor -->
      <rect x="65" y="33" width="1" height="8" fill="#ffffff">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Person 1 - Woman with Tablet (Left) -->
    <g transform="translate(80, 120)">
      <!-- Body -->
      <ellipse cx="20" cy="70" rx="15" ry="25" fill="#0F828A" opacity="0.8"/>
      <!-- Head -->
      <circle cx="20" cy="35" r="18" fill="#D4B5A0"/>
      <!-- Hair -->
      <path d="M5 30 C5 20, 35 20, 35 30 L35 40 C35 45, 30 50, 20 50 C10 50, 5 45, 5 40 Z" fill="#4A4A4A"/>
      <!-- Tablet -->
      <rect x="35" y="55" width="25" height="35" rx="3" fill="url(#laptopGradient)" stroke="#004B49" stroke-width="1"/>
      <rect x="38" y="58" width="19" height="29" rx="1" fill="#EAF7F7"/>
      <!-- Screen Content -->
      <rect x="40" y="62" width="15" height="2" fill="#0F828A" opacity="0.6"/>
      <rect x="40" y="66" width="10" height="2" fill="#0F828A" opacity="0.4"/>
      <circle cx="47" cy="72" r="4" fill="#0F828A" opacity="0.3"/>
      <!-- Arms -->
      <ellipse cx="30" cy="65" rx="8" ry="4" fill="#D4B5A0" transform="rotate(-20 30 65)"/>
      <ellipse cx="40" cy="68" rx="8" ry="4" fill="#D4B5A0" transform="rotate(15 40 68)"/>
    </g>
    
    <!-- Person 2 - Man with Laptop (Right) -->
    <g transform="translate(280, 140)">
      <!-- Body -->
      <ellipse cx="20" cy="65" rx="16" ry="28" fill="#004B49" opacity="0.9"/>
      <!-- Head -->
      <circle cx="20" cy="30" r="16" fill="#E8C4A0"/>
      <!-- Hair -->
      <path d="M8 25 C8 18, 32 18, 32 25 L32 35 C32 38, 28 42, 20 42 C12 42, 8 38, 8 35 Z" fill="#2D2D2D"/>
      <!-- Small Laptop -->
      <rect x="5" y="75" width="30" height="20" rx="2" fill="url(#laptopGradient)" stroke="#004B49" stroke-width="1"/>
      <rect x="7" y="65" width="26" height="16" rx="1" fill="#004B49"/>
      <rect x="9" y="67" width="22" height="12" rx="1" fill="url(#screenGlow)"/>
      <!-- Screen Details -->
      <rect x="12" y="70" width="8" height="1" fill="#0F828A" opacity="0.7"/>
      <rect x="12" y="72" width="12" height="1" fill="#0F828A" opacity="0.5"/>
      <rect x="12" y="74" width="6" height="1" fill="#0F828A" opacity="0.6"/>
      <!-- Arms -->
      <ellipse cx="12" cy="70" rx="6" ry="3" fill="#E8C4A0" transform="rotate(-30 12 70)"/>
      <ellipse cx="28" cy="72" rx="6" ry="3" fill="#E8C4A0" transform="rotate(25 28 72)"/>
    </g>
    
    <!-- Person 3 - Person with Mobile Device (Background) -->
    <g transform="translate(200, 100)">
      <!-- Body -->
      <ellipse cx="15" cy="55" rx="12" ry="22" fill="#0F828A" opacity="0.6"/>
      <!-- Head -->
      <circle cx="15" cy="25" r="14" fill="#F5D5AE"/>
      <!-- Hair -->
      <path d="M4 20 C4 14, 26 14, 26 20 L26 30 C26 33, 22 36, 15 36 C8 36, 4 33, 4 30 Z" fill="#8B4513"/>
      <!-- Mobile Device -->
      <rect x="25" y="45" width="8" height="15" rx="2" fill="#ffffff" stroke="#004B49" stroke-width="0.5"/>
      <rect x="26" y="47" width="6" height="11" rx="1" fill="#EAF7F7"/>
      <!-- Screen Content -->
      <rect x="27" y="49" width="4" height="1" fill="#0F828A" opacity="0.5"/>
      <rect x="27" y="51" width="3" height="1" fill="#0F828A" opacity="0.4"/>
      <circle cx="29" cy="54" r="1.5" fill="#0F828A" opacity="0.3"/>
      <!-- Arm -->
      <ellipse cx="20" cy="50" rx="5" ry="2" fill="#F5D5AE" transform="rotate(20 20 50)"/>
    </g>
    
    <!-- Collaboration Elements -->
    <!-- Connection Lines -->
    <path d="M130 200 Q180 190 230 210" stroke="#0F828A" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10;0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M160 180 Q200 160 250 180" stroke="#004B49" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;6;0" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Floating Tech Icons -->
    <!-- WiFi Symbol -->
    <g transform="translate(120, 80)">
      <path d="M0 20 Q10 10 20 20 M5 20 Q10 15 15 20 M10 20 L10 20" stroke="#0F828A" stroke-width="2" fill="none" opacity="0.5" filter="url(#softGlow)">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Cloud Icon -->
    <g transform="translate(320, 60)">
      <path d="M5 15 C5 10, 15 10, 15 15 C20 15, 20 20, 15 20 L5 20 C0 20, 0 15, 5 15 Z" fill="#0F828A" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Gear Icon -->
    <g transform="translate(280, 90)">
      <circle cx="8" cy="8" r="3" fill="none" stroke="#004B49" stroke-width="1" opacity="0.5"/>
      <rect x="7" y="2" width="2" height="4" fill="#004B49" opacity="0.5"/>
      <rect x="7" y="10" width="2" height="4" fill="#004B49" opacity="0.5"/>
      <rect x="2" y="7" width="4" height="2" fill="#004B49" opacity="0.5"/>
      <rect x="10" y="7" width="4" height="2" fill="#004B49" opacity="0.5"/>
      <animateTransform attributeName="transform" type="rotate" values="0 8 8;360 8 8" dur="8s" repeatCount="indefinite"/>
    </g>
    
    <!-- Success/Growth Indicators -->
    <!-- Chart Bars -->
    <g transform="translate(350, 250)">
      <rect x="0" y="20" width="6" height="10" fill="#0F828A" opacity="0.6"/>
      <rect x="8" y="15" width="6" height="15" fill="#0F828A" opacity="0.7"/>
      <rect x="16" y="10" width="6" height="20" fill="#0F828A" opacity="0.8">
        <animate attributeName="height" values="20;25;20" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;5;10" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Additional Decorative Elements -->
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0F828A" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="300" height="450" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Floating particles for depth -->
  <circle cx="250" cy="100" r="1.5" fill="#0F828A" opacity="0.4">
    <animate attributeName="cy" values="100;90;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="300" r="1" fill="#004B49" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="350" r="2" fill="#0F828A" opacity="0.3">
    <animate attributeName="cy" values="350;340;350" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>