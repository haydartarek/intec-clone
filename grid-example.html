<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern CSS Grid Layout</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <section class="grid-layout">
        <div class="grid-item">
            <h3>Top Left - Large Block</h3>
        </div>
        <div class="grid-item">
            <h3>Top Right - Medium Block</h3>
        </div>
        <div class="grid-item">
            <h3>Bottom Left - Small Block</h3>
        </div>
        <div class="grid-item">
            <h3>Bottom Right - Small Block</h3>
        </div>
    </section>
</body>
</html>
